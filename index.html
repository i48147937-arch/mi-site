<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мій сайт</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }
    header {
      background: #2563eb;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }
    main {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ласкаво просимо на мій сайт</h1>
    <p>Тут буде твій контент і реклама</p>
  </header>

  <main>
    <div class="card">
      <h2>Про сайт</h2>
      <p>Це простий сайт, який можна пізніше доповнити новинами, статтями або товарами.</p>
    </div>

    <div class="card">
      <h2>Що далі</h2>
      <p>Коли на сайт буде більше відвідувачів, можна підключити рекламу.</p>
      <a class="btn" href="#contact">Зв’язатися</a>
    </div>

    <div class="card" id="contact">
      <h2>Контакти</h2>
      <p>Email: example@email.com</p>
    </div>
  </main>

  <footer>
    © 2026 Мій сайт
  </footer>
</body>
</html>
